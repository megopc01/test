name: Perpetual Dual

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          pip install pytrends huggingface_hub moviepy==1.0.3 tqdm requests nest_asyncio pillow edge-tts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: 📜 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          cat << 'EOF' > script.py
          import os, shutil, requests, asyncio, nest_asyncio, re, time, random, sys, json
          from datetime import datetime
          from pytrends.request import TrendReq
          from moviepy.editor import ImageClip, AudioFileClip, concatenate_videoclips
          from huggingface_hub import InferenceClient
          from edge_tts import Communicate
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()

          HISTORY_FILE = "history.txt"
          TOKEN_FILE = ".github/workflows/tokin.txt"
          NUM_SENTENCES = 40
          WIDTH, HEIGHT = 1280, 720
          FPS = 24
          FINAL_VIDEO = "output.mp4"

          def log(msg):
              print(msg)

          def setup_environment():
              for f in ["images", "audio"]:
                  if os.path.exists(f): shutil.rmtree(f)
                  os.makedirs(f, exist_ok=True)
              log("🚀 [READY] بيئة العمل جاهزة.")

          # قراءة التوكنات من الملف
          HF_TOKENS = []
          if os.path.exists(TOKEN_FILE):
              with open(TOKEN_FILE, "r", encoding="utf-8") as f:
                  content = f.read()
                  # تحويل الأسطر الجديدة إلى فواصل ثم التقسيم
                  HF_TOKENS = [t.strip() for t in content.replace('\n', ',').split(',') if t.strip()]

          if not HF_TOKENS:
              log(f"❌ [ERROR] لم يتم العثور على التوكنات! يرجى التأكد من وجودها داخل الملف: {TOKEN_FILE}")
              sys.exit(1)

          current_token_idx = 0
          client = InferenceClient(token=HF_TOKENS[current_token_idx])

          def switch_token(is_error=False):
              global current_token_idx, client
              current_token_idx = (current_token_idx + 1) % len(HF_TOKENS)
              if is_error:
                  log(f"⚠️ [ERROR] حدث خطأ أو توقف! جاري التبديل فوراً إلى التوكن رقم {current_token_idx + 1}...")
              else:
                  log(f"🔄 [AUTO-SWITCH] تبديل تلقائي لتوزيع الضغط إلى التوكن رقم {current_token_idx + 1}...")
              client = InferenceClient(token=HF_TOKENS[current_token_idx])

          def get_filtered_trend():
              log("🚀 جاري صيد التريند الحالي...")
              pytrends = TrendReq(hl='ar', tz=0)
              excluded_words = ["ديزني", "افلام", "فيلم", "فلم","هندى", "هندي", "صينى", "صيني","تركى", "تركي", "الحلقه", "الحلقة",  "كوري", "الذئاب", "باكستاني", "افلام", "حلقه", "حلقة","ديزنى"]
              
              try:
                  pytrends.build_payload(["مدبلج"], timeframe='now 4-H', gprop='youtube')
                  results = pytrends.related_queries()
                  used = []
                  if os.path.exists(HISTORY_FILE):
                      with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                  
                  today_str = datetime.now().strftime("%Y-%m-%d")
                  
                  if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                      df_top = results['مدبلج']['top']
                      new_titles = []
                      for w in df_top['query'].tolist():
                          entry = f"{today_str}:{w}"
                          if "مدبلج" in w and len(w) >= 15 and entry not in used and not any(word in w for word in excluded_words):
                              new_titles.append((w, entry))
                      
                      if new_titles:
                          q, entry = new_titles[0]
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(entry + "\n")
                          return q
                  log("⚠️ لا توجد تريندات جديدة.")
                  return None
              except Exception as e:
                  log(f"⚠️ خطأ: {e}")
                  return None

          def clean_arabic_text(text):
              text = re.sub(r'[^\u0600-\u06FF\s]', '', text)
              return " ".join(text.split()).strip() + "."

          def generate_connected_story(topic, count):
              log(f"📝 [TEXT] جاري تأليف السيناريو عن: {topic}...")
              sys_prompt = (
                  f"Write a {count}-part cohesive, continuously flowing story about '{topic}'. "
                  f"The narrative MUST be seamlessly connected, reading like one continuous unified paragraph, not isolated sentences. "
                  f"Arabic: 50-100 words per part, flowing logically from the previous part without breaking the story, NO punctuation inside, one period at end. "
                  f"English: Detailed 4k cinematic prompt matching the Arabic part. "
                  f"Format: S[N]: [Arabic] P[N]: [English]"
              )
              
              attempts = 0
              max_attempts = len(HF_TOKENS) * 2
              switch_token(is_error=False)
              
              while attempts < max_attempts:
                  try:
                      res = client.chat_completion(
                          model="Qwen/Qwen2.5-72B-Instruct",
                          messages=[{"role": "user", "content": sys_prompt}],
                          max_tokens=1500
                      )
                      content = res.choices[0].message.content
                      sents = re.findall(r"(?:S|س)\d+:\s*(.*?)(?=(?:P|ب|S|س)\d+:|$)", content, re.DOTALL | re.IGNORECASE)
                      prompts = re.findall(r"(?:P|ب)\d+:\s*(.*?)(?=(?:S|س|P|ب)\d+:|$)", content, re.DOTALL | re.IGNORECASE)
                      return [clean_arabic_text(s) for s in sents][:count], [p.strip() for p in prompts][:count]
                  except Exception as e:
                      log(f"⚠️ تفاصيل الخطأ في التأليف: {e}")
                      attempts += 1
                      switch_token(is_error=True)
                      time.sleep(1)
              return [], []

          def generate_single_image(prompt, idx):
              path = f"images/img_{idx}.jpg"
              log(f"🖼️ [IMG {idx+1}] جاري الرسم...")
              attempts = 0
              max_attempts = len(HF_TOKENS) * 2
              switch_token(is_error=False)
              
              while attempts < max_attempts:
                  try:
                      img = client.text_to_image(prompt, model="black-forest-labs/FLUX.1-schnell", width=WIDTH, height=HEIGHT)
                      img.save(path)
                      return path
                  except Exception as e:
                      log(f"⚠️ تفاصيل الخطأ في الرسم: {e}")
                      attempts += 1
                      switch_token(is_error=True)
                      time.sleep(1)
              return None

          async def generate_single_voice(text, idx):
              path = f"audio/voice_{idx}.mp3"
              log(f"🎙️ [AUD {idx+1}] جاري التسجيل...")
              try:
                  comm = Communicate(text, "ar-EG-ShakirNeural")
                  await comm.save(path)
                  return path
              except Exception as e:
                  log(f"⚠️ تفاصيل الخطأ في الصوت: {e}")
                  return None

          def render_fast_video(scenes_data):
              log("🎬 [RENDER] جاري دمج المشاهد بأقصى سرعة...")
              clips = []
              for aud_p, img_p in scenes_data:
                  if not aud_p or not img_p: continue
                  try:
                      audio = AudioFileClip(aud_p)
                      duration = audio.duration + 0.5
                      clip = (ImageClip(img_p)
                              .set_duration(duration)
                              .resize(lambda t: 1.0 + 0.05 * (t / duration)) 
                              .set_position('center'))
                      clip = clip.on_color(size=(WIDTH, HEIGHT), color=(0,0,0), pos='center')
                      clips.append(clip.set_audio(audio))
                  except: pass

              if not clips: return None
              
              try:
                  final = concatenate_videoclips(clips, method="compose")
                  final.write_videofile(FINAL_VIDEO, fps=FPS, codec="libx264", audio_codec="aac", preset="ultrafast", logger=None)
                  return FINAL_VIDEO
              except: return None

          def upload_to_youtube(video_path, trend_title):
              if not os.path.exists(video_path): return
              
              video_number = 1
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      video_number = len(f.read().splitlines())
              
              video_title = f"{trend_title} #{video_number}"
              log(f"🚀 جاري الرفع إلى يوتيوب باسم: {video_title} ...")
              
              try:
                  creds_data = json.loads(os.environ['YOUTUBE_CREDENTIALS'])
                  creds = Credentials.from_authorized_user_info(creds_data)
                  youtube = build('youtube', 'v3', credentials=creds)

                  body = {
                      'snippet': {
                          'title': video_title,
                          'description': '', 
                          'categoryId': '24' 
                      },
                      'status': {
                          'privacyStatus': 'public',
                          'selfDeclaredMadeForKids': False
                      }
                  }

                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  request = youtube.videos().insert(
                      part=','.join(body.keys()),
                      body=body,
                      media_body=media
                  )
                  response = request.execute()
                  log(f"✅ تم الرفع بنجاح! رابط الفيديو: https://www.youtube.com/watch?v={response['id']}")
              except Exception as e:
                  log(f"❌ فشل الرفع إلى يوتيوب: {e}")
              
              if os.path.exists(video_path): os.remove(video_path)
              if os.path.exists("images"): shutil.rmtree("images")
              if os.path.exists("audio"): shutil.rmtree("audio")

          async def create_video(title):
              start = time.time()
              setup_environment()
              
              sentences, prompts = generate_connected_story(title, NUM_SENTENCES)
              if not sentences:
                  log("❌ [ERROR] فشل توليد القصة.")
                  return

              audio_paths, image_paths = [], []
              for i in range(len(sentences)):
                  img = generate_single_image(prompts[i], i)
                  aud = await generate_single_voice(sentences[i], i)
                  image_paths.append(img)
                  audio_paths.append(aud)
                  time.sleep(1)

              v_path = render_fast_video(list(zip(audio_paths, image_paths)))
              
              if v_path:
                  log(f"✅ [DONE] تم الانتهاء من الرندر في {round((time.time()-start)/60, 1)} دقيقة")
                  upload_to_youtube(v_path, title)

          async def main():
              delay = random.randint(1, 3)
              log(f"⏳ بدء الجلسة.. سيتم الانتظار لمدة {delay} ثانية قبل التنفيذ...")
              time.sleep(delay)
              
              title = get_filtered_trend()
              if title: 
                  await create_video(title)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python script.py

      - name: 💾 Commit History to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt || true
          git commit -m "📝 Update trends history" || true
          git push || true

      - name: ⏳ Wait 3 Hours & Restart Session
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "تم إنشاء الفيديو وتحديث السجل. ستبدأ فترة الانتظار لـ 3 ساعات..."
          sleep 10800
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
